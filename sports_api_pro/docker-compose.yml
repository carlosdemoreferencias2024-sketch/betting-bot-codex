version: "3.8"

services:
  db:
    image: postgres:15
    container_name: sports_api_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sports_api_cache
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: sports_api
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://admin_sports:change_me_2026@db:5432/sports_analytics
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data

  scheduler:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: sports_api_scheduler
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://admin_sports:change_me_2026@db:5432/sports_analytics
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: ["python", "-m", "app.worker.scheduler"]

volumes:
  postgres_data:
